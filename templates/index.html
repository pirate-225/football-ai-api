<!DOCTYPE html>
<html>
<head>
    <title>Football AI Predictor</title>
</head>
<body>
    <h1>Football AI Prediction</h1>

    <form method="POST">
        <label>Home Team:</label>
        <select name="home_team">
            {% for team in teams %}
            <option value="{{ team }}">{{ team }}</option>
            {% endfor %}
        </select>

        <label>Away Team:</label>
        <select name="away_team">
            {% for team in teams %}
            <option value="{{ team }}">{{ team }}</option>
            {% endfor %}
        </select>

        <br><br>

        Odds Home: <input type="text" name="odds_home"><br>
        Odds Draw: <input type="text" name="odds_draw"><br>
        Odds Away: <input type="text" name="odds_away"><br>

        <br>
        <input type="submit" value="Predict">
    </form>

    {% if prediction %}
        <h2>Prediction</h2>
        Home Win: {{ prediction.home }}<br>
        Draw: {{ prediction.draw }}<br>
        Away Win: {{ prediction.away }}<br>
        Over 2.5: {{ prediction.over }}<br>
        BTTS: {{ prediction.btts }}<br>
    {% endif %}

</body>
</html>
